services:
  - type: web
    name: sov-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_HOST
        sync: false
      - key: PORT
        value: "8080"
      - key: ADMIN_IDS
        sync: false
    autoDeploy: true
