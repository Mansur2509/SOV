services:
  - type: web
    name: sov-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_HOST
        sync: false          # оставь ПУСТЫМ → бот работает в polling режиме
      - key: PORT
        value: "8080"
    autoDeploy: true
