services:
  - type: worker
    name: sov-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # вводишь вручную в Render Dashboard
      - key: DATABASE_URL
        sync: false          # строка подключения Supabase
      - key: WEBHOOK_HOST
        sync: false          # например: https://sov-bot.onrender.com
      - key: PORT
        value: "8080"
    autoDeploy: true
